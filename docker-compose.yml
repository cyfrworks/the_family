services:
  cyfr:
    container_name: cyfr
    image: ghcr.io/cyfrworks/cyfr:latest
    ports:
      - "4000:4000"
      - "4001:4001"
    volumes:
      - ./data:/app/data
      - ./components:/app/components
    env_file:
      - .env

  # ════════════════════════════════════════════
  # Web — Builds frontend on every `docker compose up`
  # ════════════════════════════════════════════

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./client:/src:ro
      - web-dist:/app/dist
      - web-node-modules:/app/node_modules
    env_file:
      - .env
    environment:
      EXPO_PUBLIC_CYFR_URL: /mcp
    command: sh -c "cp -r /src/. /app/ && npm ci && npx expo export --platform web"

  # ════════════════════════════════════════════
  # Caddy — Reverse Proxy + Web Frontend
  # ════════════════════════════════════════════

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - web-dist:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      cyfr:
        condition: service_started
      web:
        condition: service_completed_successfully

volumes:
  web-dist:
  web-node-modules:
  caddy-data:
  caddy-config:
