services:
  cyfr:
    container_name: cyfr
    image: ghcr.io/cyfrworks/cyfr:latest
    ports:
      - "4000:4000"
      - "4001:4001"
    volumes:
      - ./data:/app/data
      - ./components:/app/components
    env_file:
      - .env

  # ════════════════════════════════════════════
  # Informant REST proxy
  # ════════════════════════════════════════════

  inform-proxy:
    container_name: inform-proxy
    profiles: [caddy]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./inform-proxy.js:/app/inform-proxy.js:ro
    env_file:
      - .env
    environment:
      CYFR_URL: http://cyfr:4000/mcp
      CYFR_PUBLIC_KEY: ${EXPO_PUBLIC_CYFR_PUBLIC_KEY}
    command: node inform-proxy.js
    depends_on:
      cyfr:
        condition: service_started

  # ════════════════════════════════════════════
  # Web + Caddy — Production (profile: caddy)
  # Enable with COMPOSE_PROFILES=caddy in .env
  # ════════════════════════════════════════════

  web:
    container_name: web
    profiles: [caddy]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./client:/src:ro
      - web-dist:/app/dist
      - web-node-modules:/app/node_modules
    env_file:
      - .env
    environment:
      EXPO_PUBLIC_CYFR_URL: /mcp
    command: sh -c "cp -r /src/. /app/ && npm ci && env | grep ^EXPO_PUBLIC_ > /app/.env && npx expo export --platform web --output-dir /tmp/dist && rm -rf /app/dist/* && cp -r /tmp/dist/. /app/dist/"

  # Caddy — Reverse Proxy + Web Frontend

  caddy:
    container_name: caddy
    profiles: [caddy]
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - web-dist:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      cyfr:
        condition: service_started
      web:
        condition: service_completed_successfully
      inform-proxy:
        condition: service_started

volumes:
  web-dist:
  web-node-modules:
  caddy-data:
  caddy-config:
